# Replica el proxy del dev server de Vite:
#   /api/*  -> api:3000 (quitando el prefijo /api, igual que el rewrite de Vite)
#   /ws     -> api:3000/ws (upgrade WebSocket)
#   /*      -> SPA (fallback a index.html)
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # API REST
  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket de notificaciones en tiempo real
  location /ws {
    proxy_pass http://api:3000/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }

  # SPA — todo lo demás cae en index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
