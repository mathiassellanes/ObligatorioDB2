services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mundial}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mundial}
      POSTGRES_DB: ${POSTGRES_DB:-mundial2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mundial} -d ${POSTGRES_DB:-mundial2026}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-mundial}:${POSTGRES_PASSWORD:-mundial}@db:5432/${POSTGRES_DB:-mundial2026}
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  pgdata:
